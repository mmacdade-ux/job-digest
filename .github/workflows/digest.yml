name: Daily job digest

on:
  schedule:
    # 21:00 UTC = 07:00 Australia/Brisbane (no DST in QLD)
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

permissions:
  contents: write          # GITHUB_TOKEN may push to this repo

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build digest
        run: python3 scripts/build_digest.py

      - name: Commit and push if changed
        run: |
          git config user.name "job-digest-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Digest $(date -u +%F)"
            git push
          fi
